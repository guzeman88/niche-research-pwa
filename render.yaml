# Render Blueprint — deploys the Python FastAPI backend
# Free tier: render.com → New → Blueprint → point to this repo
services:
  - type: web
    name: niche-research-api
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BACKEND_DIR
        value: /opt/render/project/src/backend
