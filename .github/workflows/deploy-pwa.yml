name: Refresh PWA Data And Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MIN_KEYWORD_SNAPSHOT_COUNT: '13000'
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: 9c00efca-ced9-4097-b302-172437380b32
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run smoke

      - name: Link Netlify project
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        run: npx --yes netlify-cli link --id="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"

      - name: Deploy to Netlify
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        run: npx --yes netlify-cli deploy --prod --dir=dist --no-build --auth="$NETLIFY_AUTH_TOKEN"

      - name: Explain skipped deploy
        if: ${{ env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' }}
        run: |
          echo "Built and smoke-checked the PWA, but skipped Netlify deploy."
          echo "Set the NETLIFY_AUTH_TOKEN repository secret to enable GitHub deploys."
