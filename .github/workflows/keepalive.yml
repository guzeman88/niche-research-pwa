name: Keep Render Backend Awake
# Free keep-alive — pings every 10 min so Render free tier never sleeps
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes (Render sleeps after 15)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sf https://niche-research-api-kqlt.onrender.com/api/health || true
          curl -sf https://niche-research-api-kqlt.onrender.com/api/stats || true
