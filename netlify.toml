[build]
  command = "npm run build"
  publish = "dist"

# Set your backend URL after deploying the API to Render:
# Go to Site settings → Environment variables → Add VITE_API_URL
# Example: VITE_API_URL = https://niche-research-api.onrender.com

[[redirects]]
  from = "/api/*"
  to = "https://niche-research-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
