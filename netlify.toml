[build]
  command = "npm run build"
  publish = "dist"

# Optional: set VITE_API_URL in Netlify env vars when a live backend is available.
# Without it, the PWA serves real bundled keyword snapshots and stores user-created
# stores locally instead of depending on a suspended external API.

[[redirects]]
  from = "/explore"
  to = "/?v=15"
  status = 301
  force = true

[[redirects]]
  from = "/scheduler"
  to = "/?v=15"
  status = 301
  force = true

[[redirects]]
  from = "/settings"
  to = "/?v=15"
  status = 301
  force = true

[[redirects]]
  from = "/reports/*"
  to = "/?v=15"
  status = 301
  force = true

[[redirects]]
  from = "/assets/index-DoXtF8yg.js"
  to = "/assets/app.js"
  status = 200

[[redirects]]
  from = "/assets/index-DBDt_jGF.js"
  to = "/assets/app.js"
  status = 200

[[redirects]]
  from = "/assets/index-XQM_7qib.js"
  to = "/assets/app.js"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/asset-missing.js"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/app.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/app.css"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/asset-missing.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
