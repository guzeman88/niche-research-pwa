[build]
  command = "npm run build"
  publish = "dist"

# After deploying the backend to Render, set VITE_API_URL in Netlify env vars
# Go to: https://app.netlify.com/sites/singular-youtiao-c95d49/settings/deploys#environment
# Set: VITE_API_URL = https://niche-research-api-kqlt.onrender.com

[[redirects]]
  from = "/explore"
  to = "/?v=13"
  status = 301
  force = true

[[redirects]]
  from = "/scheduler"
  to = "/?v=13"
  status = 301
  force = true

[[redirects]]
  from = "/settings"
  to = "/?v=13"
  status = 301
  force = true

[[redirects]]
  from = "/reports/*"
  to = "/?v=13"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
