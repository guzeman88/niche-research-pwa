[build]
  command = "npm run build"
  publish = "dist"

# After deploying the backend to Render, set VITE_API_URL in Netlify env vars
# Go to: https://app.netlify.com/sites/singular-youtiao-c95d49/settings/deploys#environment
# Set: VITE_API_URL = https://YOUR-RENDER-APP.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
