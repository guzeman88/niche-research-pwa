<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="32">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Data bars -->
  <rect x="6" y="20" width="3" height="6" rx="1.5" fill="#a5b4fc" opacity="0.5"/>
  <rect x="10.5" y="16" width="3" height="10" rx="1.5" fill="#a5b4fc" opacity="0.5"/>
  <rect x="15" y="18" width="3" height="8" rx="1.5" fill="#a5b4fc" opacity="0.5"/>
  <!-- Magnifying glass -->
  <circle cx="17" cy="12" r="7" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.9"/>
  <circle cx="17" cy="12" r="4" fill="#818cf8" opacity="0.2"/>
  <!-- Handle -->
  <line x1="22" y1="17" x2="26.5" y2="21.5" stroke="#c7d2fe" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
