<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EtGen Logo Concepts</title>
<style>
:root{
  --bg:#202631;
  --surface-950:#202631;
  --surface-900:#252d3a;
  --surface-800:#303948;
  --surface-700:#354052;
  --surface-600:#465365;
  --surface-500:#607893;
  --surface-300:#9fb3ce;
  --surface-200:#bcc9d8;
  --surface-100:#d9e1ec;
  --surface-50:#f3f6fb;
  --primary-400:#6f96c8;
  --primary-300:#9fb9dc;
  --primary-200:#bed2ea;
  --green:#a9c88f;
  --amber:#f0cf89;
  --radius:8px;
}
*{box-sizing:border-box}
html{
  min-height:100%;
  background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}
body{
  margin:0;
  min-height:100vh;
  color:var(--surface-50);
  background:
    radial-gradient(circle at top left,rgba(111,150,200,.12),transparent 34rem),
    linear-gradient(135deg,#202631 0%,#252d3a 44%,#202631 100%);
  font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;
  letter-spacing:0;
}
.sheet{
  width:min(1180px,calc(100vw - 32px));
  margin:0 auto;
  padding:40px 0 48px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:14px;
}
.card{
  min-width:0;
  min-height:300px;
  display:grid;
  place-items:center;
  border:1px solid rgba(70,83,101,.72);
  border-radius:var(--radius);
  background:
    linear-gradient(180deg,rgba(48,57,72,.92),rgba(37,45,58,.92));
  box-shadow:0 18px 44px rgba(7,10,14,.25);
  padding:24px 18px;
}
.lockup{
  width:100%;
  display:grid;
  justify-items:center;
  gap:18px;
}
.logo{
  width:96px;
  height:96px;
  display:grid;
  place-items:center;
  border:1px solid rgba(111,150,200,.34);
  border-radius:var(--radius);
  background:rgba(111,150,200,.1);
  color:var(--primary-200);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 16px 34px rgba(7,10,14,.22);
}
.logo svg{
  width:100%;
  height:100%;
  display:block;
}
.wordmark{
  color:var(--surface-50);
  font-size:28px;
  line-height:1;
  font-weight:900;
  letter-spacing:0;
  white-space:nowrap;
}
.one .wordmark{
  font-weight:900;
}
.two .wordmark{
  font-size:25px;
  font-weight:950;
  letter-spacing:.12em;
}
.three .wordmark{
  display:flex;
  align-items:baseline;
  gap:5px;
  font-weight:850;
}
.four .wordmark{
  display:flex;
  align-items:center;
  gap:7px;
  font-weight:950;
}
.five .wordmark{
  display:grid;
  grid-template-columns:auto auto;
  align-items:end;
  gap:2px;
  font-size:27px;
  font-weight:900;
}
.accent{
  color:var(--primary-300);
}
.slash{
  color:var(--green);
  font-weight:800;
}
.boxed{
  display:inline-grid;
  place-items:center;
  min-width:42px;
  min-height:34px;
  border:1px solid rgba(111,150,200,.4);
  border-radius:7px;
  background:rgba(111,150,200,.1);
  color:var(--primary-200);
}
.stack-gen{
  color:var(--primary-300);
  transform:translateY(-1px);
}
@media(max-width:1100px){
  .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media(max-width:700px){
  .sheet{width:min(100vw - 24px,520px);padding-top:24px}
  .grid{grid-template-columns:1fr;gap:12px}
  .card{min-height:240px}
}
</style>
</head>
<body>
<main class="sheet">
  <section class="grid" aria-label="EtGen logo and wordmark options">
    <article class="card one">
      <div class="lockup">
        <div class="logo">
          <svg viewBox="0 0 96 96" role="img" aria-label="EtGen scanner monogram logo">
            <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
            <path d="M31 35h22M31 46h17M31 57h22" stroke="#dce8f5" stroke-width="5" stroke-linecap="round"/>
            <circle cx="62" cy="49" r="10" fill="none" stroke="#9fb9dc" stroke-width="5"/>
            <path d="m69 56 9 9" stroke="#a9c88f" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="wordmark">Et<span class="accent">Gen</span></div>
      </div>
    </article>

    <article class="card two">
      <div class="lockup">
        <div class="logo">
          <svg viewBox="0 0 96 96" role="img" aria-label="EtGen opportunity grid logo">
            <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
            <rect x="30" y="30" width="14" height="14" rx="4" fill="#bed2ea"/>
            <rect x="52" y="30" width="14" height="14" rx="4" fill="#6f96c8"/>
            <rect x="30" y="52" width="14" height="14" rx="4" fill="#a9c88f"/>
            <rect x="52" y="52" width="14" height="14" rx="4" fill="rgba(188,201,216,.38)"/>
          </svg>
        </div>
        <div class="wordmark">ETGEN</div>
      </div>
    </article>

    <article class="card three">
      <div class="lockup">
        <div class="logo">
          <svg viewBox="0 0 96 96" role="img" aria-label="EtGen profit lens logo">
            <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
            <circle cx="42" cy="44" r="15" fill="none" stroke="#bed2ea" stroke-width="5"/>
            <path d="m53 55 13 13" stroke="#9fb9dc" stroke-width="5" stroke-linecap="round"/>
            <path d="M32 50 41 39l7 7 14-16" fill="none" stroke="#a9c88f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="wordmark"><span>Et</span><span class="slash">/</span><span>Gen</span></div>
      </div>
    </article>

    <article class="card four">
      <div class="lockup">
        <div class="logo">
          <svg viewBox="0 0 96 96" role="img" aria-label="EtGen wordmark tile logo">
            <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
            <path d="M30 35h24M30 48h18M30 61h25" stroke="#dce8f5" stroke-width="5" stroke-linecap="round"/>
            <path d="M61 36v25M54 43h14" stroke="#9fb9dc" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="wordmark"><span class="boxed">Et</span><span>Gen</span></div>
      </div>
    </article>

    <article class="card five">
      <div class="lockup">
        <div class="logo">
          <svg viewBox="0 0 96 96" role="img" aria-label="EtGen niche stack logo">
            <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
            <path d="M30 31h38l-7 13H23l7-13Z" fill="#bed2ea"/>
            <path d="M35 44h38l-7 13H28l7-13Z" fill="#6f96c8"/>
            <path d="M30 57h38l-7 13H23l7-13Z" fill="#a9c88f"/>
          </svg>
        </div>
        <div class="wordmark"><span>Et</span><span class="stack-gen">Gen</span></div>
      </div>
    </article>
  </section>
</main>
</body>
</html>
