<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EtGen Selected Logo</title>
<style>
:root{
  --bg:#202631;
  --surface-900:#252d3a;
  --surface-800:#303948;
  --surface-600:#465365;
  --surface-50:#f3f6fb;
  --primary-300:#9fb9dc;
  --primary-200:#bed2ea;
  --green:#a9c88f;
  --radius:8px;
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg);-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  color:var(--surface-50);
  background:
    radial-gradient(circle at top left,rgba(111,150,200,.12),transparent 34rem),
    linear-gradient(135deg,#202631 0%,#252d3a 44%,#202631 100%);
  font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;
  letter-spacing:0;
}
.card{
  width:min(460px,calc(100vw - 32px));
  min-height:360px;
  display:grid;
  place-items:center;
  border:1px solid rgba(70,83,101,.72);
  border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(48,57,72,.92),rgba(37,45,58,.92));
  box-shadow:0 18px 44px rgba(7,10,14,.25);
  padding:32px;
}
.lockup{
  display:grid;
  justify-items:center;
  gap:20px;
}
.logo{
  width:128px;
  height:128px;
  display:grid;
  place-items:center;
  border:1px solid rgba(111,150,200,.34);
  border-radius:var(--radius);
  background:rgba(111,150,200,.1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 16px 34px rgba(7,10,14,.22);
}
.logo svg{
  width:100%;
  height:100%;
  display:block;
}
.wordmark{
  color:var(--surface-50);
  font-size:42px;
  line-height:1;
  font-weight:900;
  letter-spacing:0;
  white-space:nowrap;
}
.accent{color:var(--primary-300)}
@media(max-width:520px){
  .card{min-height:300px;padding:24px}
  .logo{width:112px;height:112px}
  .wordmark{font-size:36px}
}
</style>
</head>
<body>
<main class="card" aria-label="EtGen selected logo and wordmark">
  <div class="lockup">
    <div class="logo">
      <svg viewBox="0 0 96 96" role="img" aria-label="EtGen profit lens logo">
        <rect x="16" y="16" width="64" height="64" rx="16" fill="rgba(111,150,200,.12)" stroke="rgba(190,210,234,.55)" stroke-width="2"/>
        <circle cx="42" cy="44" r="15" fill="none" stroke="#bed2ea" stroke-width="5"/>
        <path d="m53 55 13 13" stroke="#9fb9dc" stroke-width="5" stroke-linecap="round"/>
        <path d="M32 50 41 39l7 7 14-16" fill="none" stroke="#a9c88f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="wordmark">Et<span class="accent">Gen</span></div>
  </div>
</main>
</body>
</html>
