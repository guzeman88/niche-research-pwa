<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Creator Minimal Mockup</title>
<style>
:root{
  --bg:#202631;
  --panel:#29313f;
  --panel-2:#242c38;
  --line:#465365;
  --line-soft:#3a4656;
  --text:#f4f7fb;
  --muted:#aab8ca;
  --dim:#75859a;
  --primary:#8fb2de;
  --green:#a9c88f;
  --amber:#f0cf89;
  --radius:8px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#202631,#252d3a 48%,#202631);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;
  letter-spacing:0;
}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{
  min-height:100vh;
  display:grid;
  grid-template-columns:16rem minmax(0,1fr);
}
.rail{
  border-right:1px solid var(--line);
  background:rgba(36,44,56,.8);
  padding:18px 14px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:24px;
  font-weight:800;
}
.mark{
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border:1px solid rgba(143,178,222,.45);
  border-radius:7px;
  color:var(--primary);
}
.nav{display:grid;gap:4px}
.nav button{
  min-height:38px;
  border:1px solid transparent;
  border-radius:7px;
  background:transparent;
  color:var(--muted);
  text-align:left;
  padding:0 11px;
  font-weight:700;
}
.nav button.active{
  color:var(--text);
  background:rgba(143,178,222,.12);
  border-color:rgba(143,178,222,.28);
}
.main{
  min-width:0;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
}
.top{
  border-bottom:1px solid var(--line);
  background:rgba(36,44,56,.76);
  padding:18px 24px 14px;
}
.store{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}
.store h1{
  margin:0;
  font-size:22px;
  line-height:1.15;
}
.store .sub{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
  font-weight:650;
}
.tabs{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:4px;
  max-width:520px;
  margin-top:16px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:4px;
  background:rgba(32,38,49,.55);
}
.tabs button{
  min-width:0;
  min-height:38px;
  border:0;
  border-radius:6px;
  background:transparent;
  color:var(--muted);
  font-weight:800;
}
.tabs button.active{
  background:rgba(143,178,222,.14);
  color:var(--text);
  box-shadow:inset 0 0 0 1px rgba(143,178,222,.32);
}
.content{
  min-width:0;
  overflow:auto;
  padding:18px 24px 28px;
}
.view{
  display:none;
  max-width:1160px;
}
.view.active{display:block}
.bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.bar h2{
  margin:0;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
}
.tiny{
  color:var(--dim);
  font-size:12px;
  font-weight:750;
}
.layout{
  display:grid;
  grid-template-columns:minmax(17rem,.72fr) minmax(0,1.28fr);
  gap:14px;
}
.panel{
  min-width:0;
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:rgba(41,49,63,.84);
}
.panel.pad{padding:14px}
.keyword-list{
  display:grid;
  gap:1px;
  overflow:hidden;
}
.row{
  width:100%;
  min-width:0;
  min-height:45px;
  display:grid;
  grid-template-columns:2.15rem minmax(0,1fr) 3.4rem;
  align-items:center;
  gap:10px;
  border:0;
  border-bottom:1px solid rgba(70,83,101,.55);
  background:transparent;
  color:var(--text);
  text-align:left;
  padding:0 12px;
}
.row:last-child{border-bottom:0}
.row:hover,.row.active{background:rgba(143,178,222,.1)}
.rank,.score{
  color:var(--dim);
  font-size:12px;
  font-weight:850;
  font-variant-numeric:tabular-nums;
}
.score{text-align:right;color:var(--green)}
.kw{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:13px;
  font-weight:800;
}
.blank{
  min-height:360px;
  display:grid;
  place-items:center;
  color:var(--dim);
  font-weight:800;
  border:1px dashed var(--line);
  border-radius:var(--radius);
}
.creator{
  display:grid;
  grid-template-columns:minmax(0,1fr) 20rem;
  gap:14px;
}
.back{
  min-height:34px;
  border:1px solid var(--line);
  border-radius:7px;
  background:rgba(32,38,49,.5);
  color:var(--muted);
  padding:0 10px;
  font-weight:800;
}
.title-line{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:10px;
  margin:4px 0 14px;
}
.title-line h2{
  margin:0;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
}
.title-line h3{
  margin:3px 0 0;
  font-size:25px;
  line-height:1.1;
}
.step{
  padding:13px;
  border-bottom:1px solid rgba(70,83,101,.6);
}
.step:last-child{border-bottom:0}
.step-title{
  margin:0 0 10px;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:850;
}
.pills{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.pill{
  min-height:34px;
  border:1px solid var(--line);
  border-radius:7px;
  background:rgba(32,38,49,.46);
  color:var(--text);
  padding:0 12px;
  font-size:13px;
  font-weight:850;
}
.pill.active{
  color:var(--text);
  border-color:rgba(143,178,222,.48);
  background:rgba(143,178,222,.16);
}
.idea-list{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.idea{
  min-height:54px;
  border:1px solid var(--line-soft);
  border-radius:7px;
  background:rgba(32,38,49,.35);
  color:var(--text);
  text-align:left;
  padding:10px 11px;
  font-size:13px;
  font-weight:850;
}
.idea.active{
  border-color:rgba(169,200,143,.52);
  background:rgba(169,200,143,.12);
}
.side{
  display:grid;
  gap:10px;
  align-content:start;
}
.selection{
  padding:14px;
}
.selection .label{
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:11px;
  font-weight:850;
}
.selection .value{
  margin-top:5px;
  font-size:17px;
  line-height:1.18;
  font-weight:900;
}
.action{
  width:100%;
  min-height:38px;
  border:1px solid rgba(143,178,222,.38);
  border-radius:7px;
  background:rgba(143,178,222,.16);
  color:var(--text);
  font-weight:900;
}
.ghost{
  width:100%;
  min-height:36px;
  border:1px solid var(--line);
  border-radius:7px;
  background:transparent;
  color:var(--muted);
  font-weight:850;
}
.drawer{
  display:none;
  margin-top:10px;
  border-top:1px solid rgba(70,83,101,.55);
  padding-top:10px;
}
.drawer.open{display:block}
.metric{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  padding:7px 0;
  border-bottom:1px solid rgba(70,83,101,.38);
  font-size:12px;
  font-weight:800;
}
.metric:last-child{border-bottom:0}
.metric span:first-child{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--muted);
}
.mockup{
  width:100%;
  min-height:92px;
  resize:vertical;
  border:1px solid var(--line);
  border-radius:7px;
  background:rgba(32,38,49,.58);
  color:var(--text);
  padding:10px;
  font-size:12px;
  line-height:1.45;
}
.mobile-note{display:none}
@media(max-width:860px){
  .app{display:block}
  .rail{display:none}
  .top{padding:16px 16px 12px}
  .content{padding:14px 16px 88px}
  .layout,.creator{grid-template-columns:1fr}
  .idea-list{grid-template-columns:1fr}
  .store h1{font-size:21px}
  .title-line{align-items:flex-start;flex-direction:column}
  .tabs{max-width:none}
  .mobile-note{display:block}
}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><span class="mark">N</span> Niche Research</div>
    <nav class="nav">
      <button>Dashboard</button>
      <button>Keywords</button>
      <button>Generator</button>
      <button class="active">My Stores</button>
    </nav>
  </aside>

  <main class="main">
    <header class="top">
      <div class="store">
        <div>
          <h1>Pet Friendly Gift Studio</h1>
          <div class="sub">Pet Friendly</div>
        </div>
        <div class="tiny">23 keywords</div>
      </div>
      <div class="tabs" aria-label="Store workspace">
        <button>Store</button>
        <button class="active">Products</button>
        <button>Listings</button>
      </div>
    </header>

    <section class="content">
      <div id="keywordView" class="view active">
        <div class="bar">
          <h2>Keywords</h2>
          <span class="tiny">sorted strength</span>
        </div>
        <div class="layout">
          <div class="panel">
            <div class="keyword-list" id="keywordList"></div>
          </div>
          <div class="blank">Select keyword</div>
        </div>
      </div>

      <div id="creatorView" class="view">
        <button class="back" id="backBtn">Keywords</button>
        <div class="title-line">
          <div>
            <h2>Product Creator</h2>
            <h3 id="activeKeyword">eco-friendly pet supplies</h3>
          </div>
          <span class="tiny">real keyword only</span>
        </div>

        <div class="creator">
          <div class="panel">
            <div class="step">
              <div class="step-title">Brainstorm</div>
              <div class="pills" id="productTypes"></div>
            </div>
            <div class="step">
              <div class="step-title">Ideas</div>
              <div class="idea-list" id="ideaList"></div>
            </div>
          </div>

          <aside class="side">
            <div class="panel selection">
              <div class="label">Selected</div>
              <div class="value" id="selectedIdea">Choose idea</div>
              <button class="action" id="saveBtn" style="margin-top:14px">Save</button>
            </div>

            <div class="panel selection">
              <button class="ghost" data-drawer="mockup">Mockup</button>
              <div class="drawer" id="mockupDrawer">
                <textarea class="mockup" id="mockupText"></textarea>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const keywords = [
  {name:'eco-friendly pet supplies', score:84, product:'Mug', related:[
    ['cat lover gift',78], ['pet-friendly gift baskets',75], ['pet-friendly home decor',72],
    ['pet rescue tote bags',73], ['pet ownership stickers',76]
  ]},
  {name:'handcrafted stickers featuring pet breeds', score:84, product:'Sticker', related:[
    ['pet-friendly phone case stickers',84], ['cute pet superhero stickers set',80], ['pet ownership stickers',76]
  ]},
  {name:'pet-friendly phone case stickers', score:84, product:'Sticker', related:[
    ['handcrafted stickers featuring pet breeds',84], ['trendy pet stickers',80], ['cute pet superhero stickers set',80]
  ]},
  {name:'pet micro-identity bookmark holder', score:81, product:'Digital', related:[
    ['pet adoption guide',76], ['pet grooming guide',76], ['cat lover gift',78]
  ]},
  {name:'pet rescue tote bags', score:73, product:'Tote', related:[
    ['seasonal pet supplies tote bag',73], ['pet ownership tote bag',76], ['cat lover gift',78]
  ]},
  {name:'pet-friendly gift baskets', score:75, product:'Mug', related:[
    ['cat lover gift',78], ['dog mom travel essentials',73], ['eco-friendly pet supplies',84]
  ]},
  {name:'pet ownership stickers', score:76, product:'Sticker', related:[
    ['pet-friendly phone case stickers',84], ['cute pet superhero stickers set',80], ['pet ownership tote bag',76]
  ]},
  {name:'summer-themed pet accessories', score:73, product:'Wall Art', related:[
    ['pet-friendly home decor',72], ['pet-friendly gift baskets',75], ['seasonal pet supplies tote bag',73]
  ]}
];

const productTypes = ['Wall Art','Digital','Mug','Sticker','Apparel'];
const ideasByType = {
  'Wall Art':['Pet name print','Rescue quote print','Breed line art','Adoption day poster'],
  'Digital':['Care checklist','Travel planner','Adoption guide','Pet sitter sheet'],
  'Mug':['Dog mom mug','Cat dad mug','Rescue quote mug','Custom name mug'],
  'Sticker':['Breed sticker set','Rescue sticker','Pet icon pack','Phone case decal'],
  'Apparel':['Dog walk tee','Rescue hoodie','Breed sweatshirt','Pet parent hat']
};

let activeKeyword = keywords[0];
let activeType = productTypes[0];
let activeIdea = '';

const keywordView = document.getElementById('keywordView');
const creatorView = document.getElementById('creatorView');
const keywordList = document.getElementById('keywordList');
const productTypesEl = document.getElementById('productTypes');
const ideaList = document.getElementById('ideaList');
const activeKeywordEl = document.getElementById('activeKeyword');
const selectedIdeaEl = document.getElementById('selectedIdea');
const mockupText = document.getElementById('mockupText');

function drawKeywords(){
  keywordList.innerHTML = keywords.map((kw,index)=>`
    <button class="row" data-keyword="${kw.name}">
      <span class="rank">${index+1}</span>
      <span class="kw">${kw.name}</span>
      <span class="score">${kw.score}</span>
    </button>
  `).join('');
}

function openCreator(name){
  activeKeyword = keywords.find(kw=>kw.name===name) || keywords[0];
  activeType = productTypes[0];
  activeIdea = '';
  keywordView.classList.remove('active');
  creatorView.classList.add('active');
  renderCreator();
}

function renderCreator(){
  activeKeywordEl.textContent = activeKeyword.name;
  productTypesEl.innerHTML = productTypes.map(type=>`
    <button class="pill ${type===activeType?'active':''}" data-type="${type}">${type}</button>
  `).join('');
  ideaList.innerHTML = ideasByType[activeType].map(idea=>`
    <button class="idea ${idea===activeIdea?'active':''}" data-idea="${idea}">${idea}</button>
  `).join('');
  selectedIdeaEl.textContent = activeIdea || 'Choose idea';
  mockupText.value = activeIdea
    ? `${activeIdea}. ${activeKeyword.name}. ${activeType}. Clean Etsy thumbnail.`
    : `${activeKeyword.name}. Choose idea.`;
}

drawKeywords();

keywordList.addEventListener('click', event=>{
  const button = event.target.closest('[data-keyword]');
  if(button) openCreator(button.dataset.keyword);
});

productTypesEl.addEventListener('click', event=>{
  const button = event.target.closest('[data-type]');
  if(!button) return;
  activeType = button.dataset.type;
  activeIdea = '';
  renderCreator();
});

ideaList.addEventListener('click', event=>{
  const button = event.target.closest('[data-idea]');
  if(!button) return;
  activeIdea = button.dataset.idea;
  renderCreator();
});

document.getElementById('backBtn').addEventListener('click',()=>{
  creatorView.classList.remove('active');
  keywordView.classList.add('active');
});

document.querySelectorAll('[data-drawer]').forEach(button=>{
  button.addEventListener('click',()=>{
    const drawer = document.getElementById(button.dataset.drawer + 'Drawer');
    drawer.classList.toggle('open');
  });
});

document.getElementById('saveBtn').addEventListener('click',()=>{
  if(!activeIdea) return;
  document.getElementById('saveBtn').textContent = 'Saved';
  setTimeout(()=>document.getElementById('saveBtn').textContent = 'Save',900);
});
</script>
</body>
</html>
